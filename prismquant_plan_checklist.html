<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrismQuant - Master Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 127, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 212, 255, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 50% 80%, rgba(127, 0, 255, 0.05) 0%, transparent 25%);
            background-attachment: fixed;
            color: #e5e5e5;
        }

        /* 프리미엄 홀로그램 텍스트 효과 */
        .text-holographic {
            background: linear-gradient(135deg, #ff007f 0%, #7f00ff 40%, #00ffff 80%, #00ff7f 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 5s linear infinite;
        }

        /* 엠보싱 메탈릭 텍스트 효과 */
        .text-metallic {
            background: linear-gradient(to bottom, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 글래스모피즘 패널 */
        .glass-panel {
            background: rgba(20, 20, 22, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        
        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* 커스텀 체크박스 래퍼 */
        .task-row {
            transition: all 0.3s ease;
        }
        .task-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .custom-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background: transparent;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
            display: grid;
            place-content: center;
        }

        .custom-checkbox::before {
            content: "";
            width: 10px;
            height: 10px;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            background: linear-gradient(135deg, #7f00ff, #00d4ff);
            border-color: transparent;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }

        /* 체크된 텍스트 스타일 */
        .task-text {
            transition: color 0.3s ease;
        }
        .is-checked .task-text {
            color: #52525b; /* slate-600 */
            text-decoration: line-through;
            text-decoration-color: #52525b;
        }

        /* 홀로그램 프로그레스 바 */
        .progress-bar-fill {
            background: linear-gradient(90deg, #ff007f, #7f00ff, #00ffff);
            box-shadow: 0 0 15px rgba(127, 0, 255, 0.4);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 스크롤바 다크 테마 커스텀 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-5xl">
        
        <!-- Header + Hero Section -->
        <header class="mb-10 mt-8">
            <div class="flex flex-col gap-6">
                <div class="inline-flex items-center justify-center p-0.5 rounded-full bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500 shadow-[0_0_20px_rgba(127,0,255,0.3)] w-fit">
                    <div class="px-6 py-2 rounded-full bg-[#050505] text-sm font-semibold tracking-widest uppercase text-gray-300">
                        Local Deployment Environment
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <div class="flex-shrink-0 flex items-center justify-center">
                        <img src="PrismQ.png" alt="PrismQuant visual" class="w-[82px] md:w-[96px] lg:w-[110px] h-auto object-contain opacity-95 drop-shadow-[0_0_22px_rgba(127,0,255,0.75)]">
                    </div>
                    <div class="text-left">
                        <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tighter mb-2">
                            <span class="text-metallic">Prism</span><span class="text-holographic">Quant</span>
                        </h1>
                        <p class="text-gray-400 text-base md:text-lg lg:text-xl font-light tracking-wide">
                            Service Launch Checklist v2 (5-Phase)
                        </p>
                    </div>
                </div>

                <div class="mt-6 h-px w-full bg-gradient-to-r from-transparent via-purple-500/40 to-transparent"></div>
            </div>
        </header>

        <!-- Progress Section -->
        <div class="glass-panel rounded-2xl p-6 mb-10 sticky top-4 z-10">
            <div class="flex justify-between items-end mb-3">
                <div>
                    <h2 class="text-sm font-bold tracking-widest uppercase text-gray-400 mb-1">Overall Progress</h2>
                    <div class="text-3xl font-bold text-white"><span id="progress-percent">0</span>%</div>
                </div>
                <div class="text-right">
                    <span class="text-gray-500 text-sm font-medium"><span id="tasks-completed">0</span> / <span id="tasks-total">0</span> Tasks</span>
                </div>
            </div>
            <div class="w-full bg-[#1a1a1c] rounded-full h-2.5 border border-gray-800 overflow-hidden">
                <div id="progress-bar" class="progress-bar-fill h-2.5 rounded-full" style="width: 0%"></div>
            </div>
            <div class="mt-4 flex justify-end">
                <button onclick="resetChecklist()" class="text-xs text-gray-500 hover:text-red-400 transition-colors flex items-center gap-1">
                    <i data-lucide="rotate-ccw" class="w-3 h-3"></i> Reset Progress
                </button>
            </div>
        </div>

        <!-- Checklist Container -->
        <main id="checklist-container" class="pb-20 grid gap-5 md:grid-cols-2 xl:grid-cols-3">
            <!-- JavaScript will populate this -->
        </main>

        <!-- Backlog / Future Scope -->
        <section class="glass-panel rounded-2xl p-6 mb-16">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-1.5 rounded-lg bg-gray-800/60 text-gray-300 shadow-inner">
                    <i data-lucide="archive" class="w-4 h-4"></i>
                </div>
                <div>
                    <h2 class="text-sm font-semibold text-gray-100 tracking-wide">Backlog / Future Scope</h2>
                    <p class="text-xs text-gray-500 mt-0.5">현재 5단계 범위 밖의 중장기 과제 보관소</p>
                </div>
            </div>
            <ul id="backlog-list" class="space-y-2 text-sm text-gray-300">
                <!-- JavaScript will populate this -->
            </ul>
        </section>

    </div>

    <script>
        // --- Data Structure ---
        const checklistData = [
            {
                id: 'phase1',
                icon: 'server',
                title: 'Phase 1: 인프라 및 홈 서버 네트워크 세팅',
                tasks: [
                    { id: 't1-1', text: 'Mac 전원/절전 설정 최적화: 디스플레이 꺼짐 상태에서도 자동 잠자기 방지' },
                    { id: 't1-2', text: 'Mac Mini 로컬 고정 IP 할당 및 라우터 DHCP 예약 설정' },
                    { id: 't1-3', text: 'Homebrew 및 필수 패키지(curl, git, openssl 등) 설치' },
                    { id: 't1-4', text: '공유기 포트포워딩(80/443) -> Mac Mini 고정 IP 매핑' },
                    { id: 't1-5', text: 'Cloudflare 네임서버 전환 및 A 레코드(프록시 ON) 구성' },
                    { id: 't1-6', text: 'Cloudflare SSL/TLS Strict + Origin CA 인증서 발급 및 보관' },
                    { id: 't1-7', text: 'Docker Desktop 자원 할당 및 docker-compose 기본 web-network 정의' }
                ]
            },
            {
                id: 'phase2',
                icon: 'database',
                title: 'Phase 2: 데이터베이스 및 메시지 브로커 구축',
                tasks: [
                    { id: 't2-1', text: 'MySQL/PostgreSQL 컨테이너 구성 및 호스트 볼륨 마운트 경로 확정' },
                    { id: 't2-2', text: 'Users/API_Keys/Trade_Logs 스키마(ERD) 설계 및 마이그레이션 기준 수립' },
                    { id: 't2-3', text: 'API Secret Key 저장 시 AES-256 양방향 암호화 정책 반영' },
                    { id: 't2-4', text: 'Redis 컨테이너를 Celery Broker/Result Backend 용도로 구성' },
                    { id: 't2-5', text: 'Redis maxmemory-policy 설정으로 캐시 및 큐 안정성 확보' }
                ]
            },
            {
                id: 'phase3',
                icon: 'activity',
                title: 'Phase 3: 코어 웹 서버 개발 (FastAPI & Nginx)',
                tasks: [
                    { id: 't3-1', text: 'FastAPI 디렉토리 구조(routers/models/schemas/core/services) 표준화' },
                    { id: 't3-2', text: 'SQLAlchemy(또는 SQLModel) 기반 DB 연동 및 핵심 CRUD API 구현' },
                    { id: 't3-3', text: 'Nginx 리버스 프록시 구성: HTTPS 유입 -> FastAPI:8000 전달' },
                    { id: 't3-4', text: 'Nginx에 Cloudflare Origin 인증서 마운트 및 SSL 적용' },
                    { id: 't3-5', text: 'Upbit/Binance WebSocket 구독 클라이언트 구성' },
                    { id: 't3-6', text: '실시간 틱 데이터 정제 후 클라이언트/전략 엔진으로 전달 파이프라인 구축' }
                ]
            },
            {
                id: 'phase4',
                icon: 'cpu',
                title: 'Phase 4: 비동기 매매 워커 구성 (Celery & 거래소 API)',
                tasks: [
                    { id: 't4-1', text: 'FastAPI와 코드 공유하는 Celery Worker 컨테이너 분리 구성' },
                    { id: 't4-2', text: 'buy_coin_task/sell_coin_task 정의 및 ccxt/거래소 REST API 호출 연결' },
                    { id: 't4-3', text: 'Redis 기반 Token Bucket 등 Rate Limit 제어 로직 적용' },
                    { id: 't4-4', text: 'Worker Concurrency 튜닝으로 다종목 동시 주문 지연 최소화' },
                    { id: 't4-5', text: 'Timeout/429 예외에 대해 autoretry + Exponential Backoff 적용' }
                ]
            },
            {
                id: 'phase5',
                icon: 'line-chart',
                title: 'Phase 5: 전략 알고리즘 통합 및 로깅/모니터링',
                tasks: [
                    { id: 't5-1', text: '실시간 호가/체결 데이터 기반 매매 타이밍 결정 로직 통합' },
                    { id: 't5-2', text: '전략 모듈 인터페이스화로 규칙 기반/ML 모델 교체 가능 구조 설계' },
                    { id: 't5-3', text: 'Filebeat/Fluentd 중 1개를 선택해 Nginx/FastAPI/Celery 로그 수집' },
                    { id: 't5-4', text: 'Elasticsearch 적재 및 Kibana 대시보드(매매/에러/리소스) 구성' },
                    { id: 't5-5', text: '운영 관점 알림 및 장애 징후 모니터링 규칙 정의' }
                ]
            }
        ];

        const backlogItems = [
            'Streamlit 기반 운영자(Admin) 대시보드 고도화',
            'B2C 사용자용 React/Next.js 대시보드 구축',
            '백테스팅 고도화(승률/MDD/시나리오별 리포트)',
            'DR 자동화(정기 백업, 외부 스토리지 전송, 복구 리허설)',
            'AI/센티먼트/온체인 신호 결합 전략 실험'
        ];

        // --- State Management ---
        const STORAGE_KEY = 'prismquant_tasks_v2';
        const LEGACY_KEYS = ['prismquant_master_state', 'prismquant_tasks'];
        let state = {};

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try { state = JSON.parse(saved); } 
                catch (e) { state = {}; }
                return;
            }

            for (const key of LEGACY_KEYS) {
                const legacy = localStorage.getItem(key);
                if (!legacy) continue;
                try {
                    window.__prismquant_legacy_backup = JSON.parse(legacy);
                    console.info('[PrismQuant] Legacy state detected and backed up to window.__prismquant_legacy_backup. Starting clean v2 checklist.');
                } catch (e) {
                    console.info('[PrismQuant] Legacy state detected but failed to parse. Starting clean v2 checklist.');
                }
                break;
            }
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            updateProgress();
        }

        function resetChecklist() {
            if(confirm('모든 진행 상황을 초기화하시겠습니까? (This action cannot be undone)')) {
                state = {};
                saveState();
                renderChecklist();
            }
        }

        // --- UI Rendering ---
        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';

            checklistData.forEach((phase) => {
                const phaseEl = document.createElement('div');
                phaseEl.className = 'glass-panel rounded-2xl overflow-hidden flex flex-col';
                
                // Phase Header
                const header = document.createElement('div');
                header.className = 'px-4 py-3 border-b border-gray-800/60 bg-[#0f0f11]/90 flex items-center gap-3';
                header.innerHTML = `
                    <div class="p-1.5 rounded-lg bg-gray-800/60 text-gray-300 shadow-inner">
                        <i data-lucide="${phase.icon}" class="w-4 h-4"></i>
                    </div>
                    <div class="flex flex-col items-start gap-0.5">
                        <span class="text-[11px] uppercase tracking-[0.25em] text-gray-500">Phase</span>
                        <h3 class="text-sm font-semibold text-gray-100 tracking-wide leading-snug">${phase.title}</h3>
                    </div>
                `;
                phaseEl.appendChild(header);

                // Phase Meta Bar
                const metaBar = document.createElement('div');
                metaBar.className = 'px-4 py-2 flex items-center justify-between text-[11px] text-gray-500 bg-gradient-to-r from-gray-950/80 via-gray-900/70 to-gray-950/80 border-b border-gray-800/60';
                metaBar.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-gray-900/80 border border-gray-700/70 text-[10px] font-semibold text-gray-200">
                            ${phase.tasks.length}
                        </span>
                        <span class="uppercase tracking-[0.18em] text-gray-400">Tasks</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="px-2 py-0.5 rounded-full bg-gray-950/90 border border-gray-800 text-[10px] font-medium text-gray-300">Checklist</span>
                        <span class="px-2 py-0.5 rounded-full bg-gray-950/90 border border-gray-800 text-[10px] font-medium text-gray-400">PrismQuant</span>
                    </div>
                `;
                phaseEl.appendChild(metaBar);

                // Tasks List
                const taskList = document.createElement('div');
                taskList.className = 'flex-1 p-2 divide-y divide-gray-800/70';
                
                phase.tasks.forEach((task) => {
                    const isChecked = state[task.id] === true;
                    
                    const label = document.createElement('label');
                    label.className = `task-row flex items-start gap-3 px-3 py-3 rounded-xl cursor-pointer ${isChecked ? 'is-checked' : ''}`;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'custom-checkbox mt-0.5 flex-shrink-0';
                    checkbox.checked = isChecked;
                    checkbox.onchange = (e) => {
                        state[task.id] = e.target.checked;
                        if(e.target.checked) {
                            label.classList.add('is-checked');
                        } else {
                            label.classList.remove('is-checked');
                        }
                        saveState();
                    };

                    const textWrapper = document.createElement('div');
                    textWrapper.className = 'flex flex-col gap-1';

                    const textSpan = document.createElement('span');
                    textSpan.className = 'task-text text-gray-300 text-sm font-medium leading-relaxed';
                    textSpan.textContent = task.text;

                    const subMeta = document.createElement('div');
                    subMeta.className = 'flex items-center gap-2 text-[11px] text-gray-500';
                    subMeta.innerHTML = `
                        <span class="inline-flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400/80 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span>
                            <span class="uppercase tracking-[0.18em]">Ready</span>
                        </span>
                        <span class="h-3 w-px bg-gray-700/70"></span>
                        <span class="uppercase tracking-[0.18em] text-gray-600">Detail</span>
                    `;

                    textWrapper.appendChild(textSpan);
                    textWrapper.appendChild(subMeta);

                    label.appendChild(checkbox);
                    label.appendChild(textWrapper);
                    taskList.appendChild(label);
                });

                phaseEl.appendChild(taskList);
                container.appendChild(phaseEl);
            });

            // Initialize Lucide icons
            lucide.createIcons();
            updateProgress();
        }

        function renderBacklog() {
            const backlogList = document.getElementById('backlog-list');
            backlogList.innerHTML = '';

            backlogItems.forEach((item) => {
                const li = document.createElement('li');
                li.className = 'flex items-start gap-2';
                li.innerHTML = `
                    <span class="mt-1.5 w-1.5 h-1.5 rounded-full bg-amber-400/90 shadow-[0_0_8px_rgba(251,191,36,0.6)]"></span>
                    <span class="leading-relaxed">${item}</span>
                `;
                backlogList.appendChild(li);
            });
        }

        function updateProgress() {
            let totalTasks = 0;
            let completedTasks = 0;

            checklistData.forEach(phase => {
                phase.tasks.forEach(task => {
                    totalTasks++;
                    if (state[task.id]) completedTasks++;
                });
            });

            const percent = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);

            document.getElementById('tasks-total').textContent = totalTasks;
            document.getElementById('tasks-completed').textContent = completedTasks;
            
            // Animate numbers
            const percentEl = document.getElementById('progress-percent');
            percentEl.textContent = percent;
            
            // Animate bar
            document.getElementById('progress-bar').style.width = `${percent}%`;
            
            // Add a subtle glow if 100%
            if(percent === 100) {
                document.getElementById('progress-bar').style.boxShadow = '0 0 25px rgba(0, 255, 255, 0.8)';
            } else {
                document.getElementById('progress-bar').style.boxShadow = '0 0 15px rgba(127, 0, 255, 0.4)';
            }
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            renderChecklist();
            renderBacklog();
        });

    </script>
</body>
</html>
